<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShareBuddy</title>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{background:#020617;}
.glow{position:fixed;border-radius:9999px;filter:blur(100px);opacity:.25;pointer-events:none}
.glow1{width:350px;height:350px;background:#3b82f6;top:-80px;left:-80px}
.glow2{width:350px;height:350px;background:#8b5cf6;bottom:-80px;right:-80px}
</style>
</head>

<body class="min-h-screen text-white">
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div id="root"></div>

<script type="text/babel">
function App() {
  return <h1>ShareBuddy</h1>;
}

const root = ReactDOM.createRoot(
  document.getElementById("root")
);

root.render(<App />);
</script>
</body>
</html>
